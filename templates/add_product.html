{% extends "base.html" %}
{% block title %}Add Product - MyDuka{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"> Add New Product</h4>
        </div>
        <div class="card-body">
            <form method="POST" action="/add_product">
                <div class="mb-3">
                    <label for="name" class="form-label">Product Name</label>
                    <input type="text" class="form-control" id="name" name="name" 
                           placeholder="e.g., Gaming Mouse" required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="buying_price" class="form-label">Buying Price ($)</label>
                        <input type="number" class="form-control" id="buying_price" name="buying_price" 
                               step="0.01" min="0" placeholder="0.00" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="selling_price" class="form-label">Selling Price ($)</label>
                        <input type="number" class="form-control" id="selling_price" name="selling_price" 
                               step="0.01" min="0" placeholder="0.00" required>
                    </div>
                </div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a href="{{ url_for('products') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-success"> Add Product</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
